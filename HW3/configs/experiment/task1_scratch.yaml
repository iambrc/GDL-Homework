# @package _global_

# 运行方式：python HW3/src/train_scratch.py experiment=task1_scratch

defaults:
  - override /data: catdog.yaml
  - override /model: catdog_cnn.yaml
  - override /callbacks: default.yaml
  - override /trainer: default.yaml
